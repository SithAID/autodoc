<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoDoc — AI Diagnostics</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg-void:#07090e; --bg-panel:#0c1220; --bg-surface:#101828; --bg-raised:#162234;
  --border-dim:#1e3048; --border-mid:#2a4468;
  --cyan:#00d4ff; --cyan-dim:#0099bb; --cyan-soft:rgba(0,212,255,0.07); --cyan-glow:rgba(0,212,255,0.2);
  --red-alert:#e05c5c; --green-ok:#00d68f; --blue-info:#4d9eff; --yellow-warn:#ffc233;
  --text-primary:#c4dff0; --text-secondary:#5c8aaa; --text-dim:#305070; --text-cyan:#5ee8ff; --text-mono:#7ab0cc;
  --font-display:'Orbitron',sans-serif; --font-ui:'Exo 2',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --radius-sm:4px; --radius-md:8px; --radius-lg:12px;
  --transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;height:100dvh;overflow:hidden;max-width:100vw;}
body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-ui);font-size:15px;letter-spacing:.01em;-webkit-font-smoothing:antialiased;max-width:100vw;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.015) 3px,rgba(0,212,255,.015) 4px);pointer-events:none;z-index:9999;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg-panel);} ::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:2px;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:60px 1fr;grid-template-columns:260px minmax(0,1fr) 280px;height:100vh;height:100dvh;width:100%;overflow:hidden;}
.topbar{grid-column:1/-1;grid-row:1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bg-panel);border-bottom:1px solid var(--border-dim);position:relative;z-index:100;min-width:0;overflow:hidden;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.4;}
.sidebar-left{grid-column:1;grid-row:2;background:var(--bg-panel);border-right:1px solid var(--border-dim);overflow-y:auto;display:flex;flex-direction:column;min-width:0;}
.main-content{grid-column:2;grid-row:2;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0;}
.sidebar-right{grid-column:3;grid-row:2;background:var(--bg-panel);border-left:1px solid var(--border-dim);overflow-y:auto;min-width:0;}

/* mobile hamburger */
.menu-btn{display:none;width:36px;height:36px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-sm);color:var(--text-secondary);font-size:18px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
.menu-btn:hover{border-color:var(--cyan-dim);color:var(--cyan);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;}

/* ── TOPBAR ── */
.logo-mark{display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--cyan),#0099cc);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:11px;color:#000;font-weight:800;font-family:var(--font-display);flex-shrink:0;animation:pulse-icon 3s ease-in-out infinite;}
@keyframes pulse-icon{0%,100%{filter:drop-shadow(0 0 0px var(--cyan));}50%{filter:drop-shadow(0 0 8px var(--cyan));}}
.logo-text{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:3px;color:var(--text-primary);line-height:1;}
.logo-sub{font-family:var(--font-mono);font-size:8px;color:var(--cyan);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;opacity:.8;}
.topbar-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green-ok);box-shadow:0 0 8px var(--green-ok);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
.status-label{font-family:var(--font-mono);font-size:10px;color:var(--green-ok);letter-spacing:2px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.sys-time{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
.nav-pill{display:flex;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-sm);overflow:hidden;}
.nav-pill-btn{padding:7px 14px;font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;transition:var(--transition);white-space:nowrap;}
.nav-pill-btn:hover{background:var(--bg-raised);color:var(--text-primary);}
.nav-pill-btn.active{background:var(--cyan);color:#000;}

/* ── SIDEBAR LEFT ── */
.sidebar-section{padding:16px;border-bottom:1px solid var(--border-dim);}
.sidebar-label{font-family:var(--font-mono);font-size:8px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;opacity:.85;}
.sidebar-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-mid),transparent);}
.vehicle-card{background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;}
.vehicle-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cyan);transform:scaleY(0);transform-origin:bottom;transition:transform .2s ease;}
.vehicle-card:hover::before,.vehicle-card.active::before{transform:scaleY(1);}
.vehicle-card.active{background:var(--bg-raised);border-color:var(--border-mid);}
.vehicle-year{font-family:var(--font-mono);font-size:9px;color:var(--cyan);letter-spacing:2px;opacity:.9;}
.vehicle-name{font-family:var(--font-display);font-size:16px;letter-spacing:1.5px;color:var(--text-primary);line-height:1.15;margin:4px 0 2px;}
.vehicle-sub{font-size:11px;color:var(--text-secondary);letter-spacing:.5px;font-family:var(--font-ui);}
.vehicle-del-btn{position:absolute;top:8px;right:8px;width:20px;height:20px;background:rgba(224,92,92,.15);border:1px solid rgba(224,92,92,.3);border-radius:3px;color:var(--red-alert);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition);}
.vehicle-card:hover .vehicle-del-btn{opacity:1;}
.vehicle-del-btn:hover{background:rgba(224,92,92,.3);}
.add-vehicle-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--border-mid);border-radius:var(--radius-md);color:var(--text-dim);font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:var(--transition);margin-top:8px;text-transform:uppercase;}
.add-vehicle-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-soft);}
.history-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);border:1px solid transparent;}
.history-item:hover{background:var(--bg-surface);border-color:var(--border-dim);}
.history-item.active-session{background:var(--cyan-soft);border-color:var(--cyan-dim);}
.history-title{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.history-meta{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.5px;}
.severity-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:2px;font-family:var(--font-mono);font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.severity-critical{background:rgba(224,92,92,.15);color:var(--red-alert);border:1px solid rgba(224,92,92,.3);}
.severity-warning{background:rgba(255,194,51,.1);color:var(--yellow-warn);border:1px solid rgba(255,194,51,.3);}
.severity-info{background:rgba(77,158,255,.1);color:var(--blue-info);border:1px solid rgba(77,158,255,.25);}
.severity-ok{background:rgba(0,214,143,.1);color:var(--green-ok);border:1px solid rgba(0,214,143,.25);}

/* ── MAIN CHAT ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border-dim);background:var(--bg-surface);flex-shrink:0;overflow-x:auto;}
.tab-btn{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:var(--transition);white-space:nowrap;}
.tab-btn:hover{color:var(--text-secondary);}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* ── MESSAGES ── */
.messages-viewport{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.message-row{display:flex;gap:12px;animation:msg-in .3s cubic-bezier(.4,0,.2,1);}
@keyframes msg-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.message-row.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:9px;font-weight:700;flex-shrink:0;letter-spacing:1px;}
.avatar-doc{background:var(--cyan-soft);border:1px solid var(--cyan-dim);color:var(--cyan);}
.avatar-user{background:rgba(77,158,255,.1);border:1px solid rgba(77,158,255,.3);color:var(--blue-info);}
.bubble{max-width:75%;padding:13px 16px;border-radius:var(--radius-md);line-height:1.65;font-size:14px;position:relative;}
.bubble-doc{background:var(--bg-surface);border:1px solid var(--border-dim);border-top-left-radius:2px;color:var(--text-primary);}
.bubble-user{background:var(--bg-raised);border:1px solid var(--border-mid);border-top-right-radius:2px;color:var(--text-primary);}
.bubble-sender{font-family:var(--font-mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.bubble-doc .bubble-sender{color:var(--cyan);}
.bubble-user .bubble-sender{color:var(--blue-info);}
.bubble-time{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);margin-top:8px;text-align:right;}
.typing-row{display:flex;align-items:center;gap:12px;animation:msg-in .3s ease;}
.typing-bubble{background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-md);border-top-left-radius:2px;padding:13px 18px;display:flex;align-items:center;gap:5px;}
.typing-dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:typing-bounce 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.15s;} .typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0);opacity:.35;}30%{transform:translateY(-6px);opacity:1;}}
.typing-label{font-family:var(--font-mono);font-size:9px;color:var(--cyan-dim);letter-spacing:1px;margin-left:6px;}
.system-message{text-align:center;padding:20px;}
.system-banner{display:inline-flex;flex-direction:column;align-items:center;gap:8px;padding:22px 36px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-lg);position:relative;overflow:hidden;}
.system-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.system-banner-title{font-family:var(--font-display);font-size:18px;letter-spacing:3px;color:var(--text-primary);}
.system-banner-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);letter-spacing:1.5px;}
.quick-prompts{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px;}
.quick-btn{padding:7px 14px;background:var(--bg-raised);border:1px solid var(--border-dim);border-radius:var(--radius-sm);color:var(--text-secondary);font-family:var(--font-ui);font-size:12px;font-weight:500;cursor:pointer;transition:var(--transition);}
.quick-btn:hover{background:var(--cyan-soft);border-color:var(--cyan-dim);color:var(--cyan);}

/* ── INPUT ── */
.input-area{padding:14px 18px;background:var(--bg-surface);border-top:1px solid var(--border-dim);flex-shrink:0;}
.input-warning{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:var(--radius-sm);margin-bottom:10px;font-family:var(--font-mono);font-size:9px;color:var(--text-cyan);letter-spacing:.5px;opacity:.8;}
.input-warning-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);flex-shrink:0;animation:blink 1.5s ease infinite;}
.input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-textarea{width:100%;padding:12px 14px;background:var(--bg-raised);border:1px solid var(--border-mid);border-radius:var(--radius-md);color:var(--text-primary);font-family:var(--font-ui);font-size:14px;font-weight:400;resize:none;min-height:46px;max-height:140px;outline:none;transition:var(--transition);line-height:1.5;}
.chat-textarea::placeholder{color:var(--text-dim);font-weight:300;}
.chat-textarea:focus{border-color:var(--cyan-dim);box-shadow:0 0 0 2px rgba(0,212,255,.1);}
.send-btn{width:46px;height:46px;background:linear-gradient(135deg,var(--cyan),#0099cc);border:none;border-radius:var(--radius-md);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;}
.send-btn:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 0 20px rgba(0,212,255,.35);transform:translateY(-1px);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.send-btn svg{width:18px;height:18px;}

/* ── RIGHT SIDEBAR ── */
.diag-panel{padding:16px;}
.gauge-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.gauge-card{background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-md);padding:12px 10px;text-align:center;}
.gauge-value{font-family:var(--font-display);font-size:24px;letter-spacing:1px;line-height:1;margin-bottom:2px;}
.gauge-unit{font-family:var(--font-mono);font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
.gauge-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;color:var(--text-secondary);text-transform:uppercase;margin-top:4px;}
.gauge-bar{height:2px;background:var(--border-dim);border-radius:1px;margin-top:8px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:1px;transition:width 1.5s cubic-bezier(.4,0,.2,1);}
.dtc-list{display:flex;flex-direction:column;gap:6px;}
.dtc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);}
.dtc-item:hover{border-color:var(--border-mid);background:var(--bg-raised);}
.dtc-indicator{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dtc-indicator.critical{background:var(--red-alert);box-shadow:0 0 6px var(--red-alert);}
.dtc-indicator.warning{background:var(--yellow-warn);box-shadow:0 0 6px var(--yellow-warn);}
.dtc-indicator.info{background:var(--blue-info);box-shadow:0 0 6px var(--blue-info);}
.dtc-item-code{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--cyan);letter-spacing:1px;flex-shrink:0;min-width:48px;}
.dtc-item-desc{font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.checklist{display:flex;flex-direction:column;gap:5px;}
.check-item{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-sm);font-size:12px;color:var(--text-secondary);}
.check-icon{font-size:13px;flex-shrink:0;}

/* ── DASHBOARD ── */
.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px;overflow-y:auto;}
.stat-card{background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:var(--radius-md);padding:16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.stat-card.ok::after{background:var(--green-ok);}
.stat-card.warn::after{background:var(--yellow-warn);}
.stat-card.crit::after{background:var(--red-alert);}
.stat-card.info::after{background:var(--cyan);}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-val{font-family:var(--font-display);font-size:28px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.stat-card.ok .stat-val{color:var(--green-ok);}
.stat-card.warn .stat-val{color:var(--yellow-warn);}
.stat-card.crit .stat-val{color:var(--red-alert);}
.stat-card.info .stat-val{color:var(--cyan);}
.stat-lbl{font-family:var(--font-mono);font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fade-in .15s ease;}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--bg-panel);border:1px solid var(--border-mid);border-radius:var(--radius-lg);padding:28px;width:480px;max-width:95vw;animation:modal-in .25s cubic-bezier(.4,0,.2,1);position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
@keyframes modal-in{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-title{font-family:var(--font-display);font-size:18px;letter-spacing:3px;color:var(--text-primary);margin-bottom:6px;}
.modal-sub{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;margin-bottom:22px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:7px;opacity:.9;}
.form-input,.form-select{width:100%;padding:10px 14px;background:var(--bg-surface);border:1px solid var(--border-mid);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-ui);font-size:14px;font-weight:400;outline:none;transition:var(--transition);}
.form-input:focus,.form-select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,.08);}
.form-input::placeholder{color:var(--text-dim);font-weight:300;}
.form-select{cursor:pointer;} .form-select option{background:var(--bg-panel);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--cyan),#0099cc);border:none;border-radius:var(--radius-sm);color:#000;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:var(--transition);margin-top:8px;}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 4px 20px rgba(0,212,255,.25);transform:translateY(-1px);}
.btn-secondary{padding:9px 18px;background:transparent;border:1px solid var(--border-mid);border-radius:var(--radius-sm);color:var(--text-secondary);font-family:var(--font-ui);font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:var(--transition);text-transform:uppercase;}
.btn-secondary:hover{border-color:var(--text-secondary);color:var(--text-primary);}
.modal-error{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);border-radius:var(--radius-sm);padding:8px 12px;font-family:var(--font-mono);font-size:11px;color:var(--red-alert);margin-bottom:12px;letter-spacing:.5px;}

/* ── SETTINGS DRAWER ── */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;animation:fade-in .15s ease;}
.settings-drawer{position:fixed;top:0;right:0;width:360px;height:100vh;background:var(--bg-panel);border-left:1px solid var(--border-mid);z-index:401;overflow-y:auto;animation:drawer-in .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
@keyframes drawer-in{from{transform:translateX(100%);}to{transform:translateX(0);}}
.drawer-header{padding:20px;border-bottom:1px solid var(--border-dim);display:flex;align-items:center;justify-content:space-between;background:var(--bg-surface);position:sticky;top:0;z-index:1;}

const guessSessionSeverity = msgs => {
  const txt = msgs.map(m=>m.content).join(' ').toLowerCase();
  if(/brake|steer|fire|fuel.?leak|smoke|no.?start/.test(txt)) return 'critical';
  if(/misfire|check.?light|noise|vibrat/.test(txt)) return 'warning';
  if(/service|inspect|oil/.test(txt)) return 'info';
  return 'ok';
};

function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='info', duration=3000) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => {
      setToasts(t => t.map(x => x.id===id ? {...x, leaving:true} : x));
      setTimeout(() => setToasts(t => t.filter(x => x.id!==id)), 300);
    }, duration);
  }, []);
  return { toasts, toast: add };
}

function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}${t.leaving?' leaving':''}`}>
          {t.type==='success'?'✓':t.type==='error'?'✕':'ℹ'} {t.msg}
        </div>
      ))}
    </div>
  );
}

function Clock() {

function AddVehicleModal({ onClose, onAdd }) {
  const [form, setForm] = useState({ year:'', make:'', model:'', engine:'', vin:'' });
  const [error, setError] = useState('');
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const submit = () => {
    if (!form.year.trim()) { setError('Year is required.'); return; }
    if (!form.make.trim()) { setError('Make is required.'); return; }
    if (!form.model.trim()) { setError('Model is required.'); return; }
    if (!/^\d{4}$/.test(form.year.trim()) || +form.year < 1950 || +form.year > new Date().getFullYear()+2) {
      setError('Enter a valid 4-digit year.'); return;
    }
    onAdd({ ...form, year:form.year.trim(), make:form.make.trim(), model:form.model.trim(), engine:form.engine.trim()||'N/A', vin:form.vin.trim()||'—', id:Date.now() });
    onClose();
  };

  return (
    <div className="modal-backdrop" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">ADD VEHICLE</div>
        <div className="modal-sub">REGISTER A NEW VEHICLE TO YOUR GARAGE</div>
        {error && <div className="modal-error">⚠ {error}</div>}

            <label className="form-label">Make *</label>

            <label className="form-label">Model *</label>

function formatMessage(text) {
  
  const escaped = text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
  return escaped
    .replace(/\n/g,'<br/>')
    .replace(/\b([PBCU]\d{4})\b/g,'<code style="color:var(--cyan);font-weight:700;letter-spacing:1px;font-family:var(--font-mono)">$1</code>')
    .replace(/⚠️([^\n<]{1,200})/g,'<span style="color:var(--yellow-warn)">⚠️$1</span>')
    .replace(/✅([^\n<]{1,200})/g,'<span style="color:var(--green-ok)">✅$1</span>');
}

function MessageBubble({ msg }) {
  const isUser = msg.role==='user';
  return (
    <div className={`message-row${isUser?' user':''}`}>
      <div className={`avatar ${isUser?'avatar-user':'avatar-doc'}`}>{isUser?'YOU':'AD'}</div>
      <div className={`bubble ${isUser?'bubble-user':'bubble-doc'}`}>
        <div className="bubble-sender">{isUser?'OPERATOR':'AUTODOC AI'}</div>
        <div dangerouslySetInnerHTML={{__html:formatMessage(msg.content)}}/>
        <div className="bubble-time">{msg.time}</div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [user,        setUser]        = useState(null);
  const [authToken,   setAuthToken]   = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  /* On mount: check saved cookie token */
  useEffect(() => {
    const token = getCookie(COOKIE_NAME);
    if (!token) { setAuthLoading(false); return; }
    fetch(`${BACKEND_URL}/api/auth/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    })
    .then(r => r.json())
    .then(data => {
      if (data.user) { setUser(data.user); setAuthToken(token); }
      else deleteCookie(COOKIE_NAME);
    })
    .catch(() => deleteCookie(COOKIE_NAME))
    .finally(() => setAuthLoading(false));
  }, []);

  /* Load encrypted API keys from server when user is set */
  useEffect(() => {
    const token = authToken || getCookie(COOKIE_NAME);
    if (!token) return;
    fetch(`${BACKEND_URL}/api/auth/apikeys`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })

    .then(data => { if (data.keys) setApiKeys(data.keys); })
    .catch(() => {});

/* ── COOKIE HELPERS ── */
const COOKIE_NAME = 'autodoc_token';
function setCookie(name, value, days) {
  const exp      = new Date(Date.now() + days * 864e5).toUTCString();
  const isSecure = location.protocol === 'https:' ? ';Secure' : '';
  document.cookie = `${name}=${encodeURIComponent(value)};expires=${exp};path=/;SameSite=Strict${isSecure}`;
}
function getCookie(name) {
  const found = document.cookie.split('; ').find(r => r.startsWith(name + '='));
  if (!found) return null;
  try { return decodeURIComponent(found.split('=').slice(1).join('=')); } catch { return null; }
}
function deleteCookie(name) {
  document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;
}

    setError('');
    if (tab === 'signup' && !name.trim()) { setError('Name is required.'); return; }
    if (!email.trim()) { setError('Email is required.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('Enter a valid email address.'); return; }
    if (!pass) { setError('Password is required.'); return; }
    if (tab === 'signup' && pass.length < 6) { setError('Password must be at least 6 characters.'); return; }

    setLoading(true);
    try {
      const endpoint = tab === 'login' ? '/api/auth/login' : '/api/auth/signup';
      const body = tab === 'login'
        ? { email: email.trim(), password: pass }
        : { name: name.trim(), email: email.trim(), password: pass };

      const res  = await fetch(`${BACKEND_URL}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Something went wrong.'); return; }

      setCookie(COOKIE_NAME, data.token, 30);
      onLogin(data.user, data.token);
    } catch (e) {
      setError('Cannot reach server. Check that the backend is running.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="login-wrap">
      <div style={{width:420,maxWidth:'96vw'}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:56,height:56,background:'linear-gradient(135deg,var(--cyan),#0099cc)',clipPath:'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-display)',fontSize:13,color:'#000',fontWeight:900,marginBottom:14,animation:'pulse-icon 3s ease-in-out infinite'}}>AD</div>
          <div style={{fontFamily:'var(--font-display)',fontSize:36,letterSpacing:6,color:'var(--text-primary)',lineHeight:1}}>AUTODOC</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:9,letterSpacing:3,color:'var(--cyan)',marginTop:8,opacity:.8}}>AI DIAGNOSTIC SYSTEM</div>
        </div>

        <div style={{background:'var(--bg-panel)',border:'1px solid var(--border-mid)',borderRadius:'var(--radius-lg)',padding:28,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,var(--cyan),transparent)'}}/>

          {/* Tabs */}
          <div className="auth-tabs">
            <button className={`auth-tab${tab==='login'?' active':''}`} onClick={()=>{ setTab('login'); setError(''); }}>LOGIN</button>
            <button className={`auth-tab${tab==='signup'?' active':''}`} onClick={()=>{ setTab('signup'); setError(''); }}>SIGN UP</button>
          </div>

          {error && <div className="modal-error">⚠ {error}</div>}

          {tab==='signup' && (
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Your name" value={name}
                onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
            </div>
          )}

          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={email}
              onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>

          <div className="form-group">
            <label className="form-label">Password {tab==='signup'&&<span style={{color:'var(--text-dim)',fontSize:9}}>(min 6 chars)</span>}</label>
            <div className="pw-row">
              <input className="form-input" type={showPw?'text':'password'} placeholder={tab==='login'?'Your password':'Create a password'} value={pass}
                style={{paddingRight:44}} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
              <button className="pw-toggle" onClick={()=>setShowPw(v=>!v)} title={showPw?'Hide':'Show'}>
                {showPw ? '🙈' : '👁'}
              </button>
            </div>
          </div>

          {loading ? (
            <div className="auth-loading"><div className="auth-spinner"/>{tab==='login'?'AUTHENTICATING...':'CREATING ACCOUNT...'}</div>
          ) : (
            <button className="btn-primary" onClick={submit}>
              {tab==='login' ? 'INITIALIZE SESSION' : 'CREATE ACCOUNT'}
            </button>
          )}

          <div style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--text-dim)',textAlign:'center',marginTop:14,letterSpacing:1,lineHeight:1.8}}>
            {tab==='login'
              ? 'CREDENTIALS STORED IN COOKIE · 30-DAY SESSION'
              : 'PASSWORDS ARE HASHED · DATA STORED LOCALLY'}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
